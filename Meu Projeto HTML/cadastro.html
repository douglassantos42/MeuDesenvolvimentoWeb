<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
    <div class="menu">
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="cadastro.html">Cadastro</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cadastrar-noticias.html">Cadastrar Notícias</a></li>
            <li><a href="listar-noticias.html">Listar Notícias</a></li>
        </ul>
    </div>

    <div class="cadastro-page">
        <div class="cadastro-box">
            <img class="cadastro-image" src="images/cadastro.png" alt="Imagem de cadastro">

            <h1>Cadastro</h1>

            <form class="cadastro-form" action="#" method="post">
                <label for="nome">Nome completo</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">

                <label for="nascimento">Data de nascimento</label>
                <input type="date" id="nascimento" name="nascimento">

                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" placeholder="Digite seu telefone">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email">

                <label for="instagram">Instagram</label>
                <input type="text" id="instagram" name="instagram" placeholder="Digite seu Instagram">

                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" placeholder="Crie seu usuario">

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Crie sua senha">

                <button type="submit">Cadastrar</button>
            </form>
        </div>
                <div>
                <a href="login.html">Ja tem cadastro? Faça login</a>
        </div>
    </div>

    <div class="rodape">
        Todos os direitos reservados - SUPERCELL TECNOLOGIA
    </div>
</body>
</html>
