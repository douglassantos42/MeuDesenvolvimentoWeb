<html>
<title>Cadastre-se</title>

<head>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="background" style="background-image: url('images/bg-cadastro.png'); background-size: cover; background-position: center;">
<h1 class="titulocadastrar">Cadastre-se</h1>
<img src="images/cadastro.png" class="img-cadastro"/>


<p class="subtitulocad">Faça cadastro para acessar e aproveite o conteúdo exclusivo do nosso site!</p>


<form style="display: flex; flex-direction: column; align-items: center;">
    <label class="cadastrarlabel">nome completo:<input type="text" class="input"/></label> 

    <label class="cadastrarlabel">e-mail:<input type="email" class="input"/></label>

    <label class="cadastrarlabel">telefone:<input type="tel" class="input"/></label>

    <label class="cadastrarlabel">data de nascimento:<input type="date" class="input"/></label>

    <label class="cadastrarlabel">instagram:<input type="text" class="input"/></label>

    <label class="cadastrarlabel">nome de usuário:<input type="text" class="input"/></label>

    <label class="cadastrarlabel">digite sua senha:<input type="password" class="input"/></label>

    <label class="cadastrarlabel">repita sua senha:<input type="password" class="input"/></label>
</form>

<br></br>

<div>
    <button class="buttoncad">Cadastrar</button>
    <button class="buttoncad">Limpar</button>
</div>
</body>
</html>
