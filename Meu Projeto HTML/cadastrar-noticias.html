<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Cadastrar Notícias</title>
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/cadastrar-noticias.css">
</head>
<body>
    <div class="menu">
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="cadastro.html">Cadastro</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="cadastrar-noticias.html">Cadastrar Notícias</a></li>
            <li><a href="listar-noticias.html">Listar Notícias</a></li>
        </ul>
    </div>

    <div class="noticias-page">
        <div class="noticias-box">
            <h1>Cadastrar Notícias</h1>

            <form class="noticias-form" action="#" method="post">
                <label for="titulo">Título da notícia</label>
                <input type="text" id="titulo" name="titulo" placeholder="Digite o título da notícia">

                <label for="categoria">Categoria</label>
                <input type="text" id="categoria" name="categoria" placeholder="Digite a categoria">

                <label for="imagem">Imagem da notícia</label>
                <input type="file" id="imagem" name="imagem">

                <label for="resumo">Resumo</label>
                <textarea id="resumo" name="resumo" placeholder="Digite um resumo da notícia"></textarea>

                <label for="conteudo">Conteúdo da notícia</label>
                <textarea id="conteudo" name="conteudo" placeholder="Digite o conteúdo completo da notícia"></textarea>

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>

    <div class="rodape">
        Todos os direitos reservados - SUPERCELL TECNOLOGIA
    </div>
</body>
</html>
