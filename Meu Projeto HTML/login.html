<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/menu.css">

<body>
    <div class="menu">
        <ul>

    <div class="login-page">
        <div class="login-box">
            <img class="login-image" src="images/login.png" alt="Imagem de login">

            <h1 id="login-title">Login</h1>

            <form class="login-form" action="#" method="post">
                <label for="usuario">Usu&aacute;rio</label>
                <input type="text" id="usuario" name="usuario" placeholder="Digite seu usu&aacute;rio">

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

                <button type="submit">Entrar</button>
            </form>

            <div class="login-links">
                <a href="cadastro.html">Não tem cadastro? Cadastre-se</a>
                <a href="recuperar-senha.html">Esqueci minha senha</a>
            </div>
        </div>
    </div>

    <div class="rodape">
        Todos os direitos reservados - SUPERCELL TECNOLOGIA

</html>
